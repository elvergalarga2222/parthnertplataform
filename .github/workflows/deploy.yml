name: Deploy to VPS

# Despliegue automático al VPS en cada push a la rama de desarrollo.
# Requiere estos secrets en el repo (Settings → Secrets and variables → Actions):
#   VPS_HOST     — IP o dominio del VPS (ej. 62.84.186.32)
#   VPS_USER     — usuario SSH (ej. root)
#   VPS_SSH_KEY  — clave privada SSH con acceso al VPS
# Si los secrets no existen, el job falla sin afectar nada: configúralos para activarlo.

on:
  push:
    branches:
      - claude/partner-manager-requirements-r11zzp
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/deploy/vps-setup.sh | bash
