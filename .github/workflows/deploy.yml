name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy-vps
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -ex
            APP_DIR="/var/www/partner-manager"
            APP_NAME="partner-manager"
            APP_PORT="${{ secrets.APP_PORT }}"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "${{ secrets.REPO_URL }}" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/main
            npm ci
            npm run build
            npm run db:migrate || echo "Migrate finished (ignoring exit code quirk)"
            echo "CHECKPOINT: migrate done, checking pm2"
            which pm2
            pm2 --version
            echo "CHECKPOINT: about to describe app"
            if pm2 describe "$APP_NAME" > /dev/null 2>&1; then
              echo "CHECKPOINT: app exists, restarting"
              pm2 restart "$APP_NAME" --update-env
            else
              echo "CHECKPOINT: app does not exist, starting fresh"
              PORT="$APP_PORT" pm2 start npm --name "$APP_NAME" -- start
            fi
            echo "CHECKPOINT: saving pm2"
            pm2 save
            echo "CHECKPOINT: all done"
